version: '3.8'

services:
  db:
    build: ./db
    container_name: tienda-db-local
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tienda_perritos
      MYSQL_USER: alumno
      MYSQL_PASSWORD: alumno123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: tienda-backend-local
    environment:
      DB_HOST: db
      DB_USER: alumno
      DB_PASSWORD: alumno123
      DB_NAME: tienda_perritos
    ports:
      - "3001:3001"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: tienda-frontend-local
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: